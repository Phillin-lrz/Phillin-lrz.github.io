<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Phil Lin的Bar | Particle 风格博客</title>
    <meta name="description" content="一个 Particle 风格的个人博客首页。">
    <link rel="stylesheet" href="assets/styles.css">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="回到首页">
        <span class="brand-mark">S</span>
        <span>Phil Lin的Bar</span>
      </a>
      <nav class="nav-links" aria-label="主导航">
        <a href="index.html" aria-current="page">首页</a>
        <a href="posts.html">文章</a>
        <a href="about.html">关于我</a>
      </nav>
      <button class="icon-button" id="themeToggle" type="button" aria-label="切换粒子效果" title="切换粒子效果">✦</button>
    </header>

    <main>
      <section class="particle-hero">
        <div class="profile-card">
          <div class="avatar">S</div>
          <p class="eyebrow">GitHub Pages · Hexo · Notes</p>
          <h1>Phil Lin的Bar</h1>
          <p class="hero-lede">一个20岁医学生的碎碎念。</p>
          <div class="hero-actions">
            <a class="button primary" href="posts.html">进入文章</a>
            <a class="button secondary" href="about.html">关于我</a>
          </div>
        </div>
      </section>

      <section class="section intro-grid" aria-label="博客内容">
        <article>
          <span class="mini-label">Code</span>
          <h2>实验Protocol</h2>
          <p>记录建站、工具、代码和项目复盘。</p>
        </article>
        <article>
          <span class="mini-label">Write</span>
          <h2>长期写作</h2>
          <p>把碎片想法整理成可以回看的文章。</p>
        </article>
        <article>
          <span class="mini-label">Life</span>
          <h2>生活观察</h2>
          <p>保留一些不急着得出结论的日常感受。</p>
        </article>
      </section>

      <section class="section split-section">
        <div>
          <p class="eyebrow">Posts</p>
          <h2>文章暂未公开</h2>
        </div>
        <div class="post-list compact">
          <article class="post-card">
            <span class="post-date">Drafting</span>
            <h3>正在整理中</h3>
            <p>这里会在文章准备好后展示公开内容。</p>
          </article>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <span>© 2026 Phil Lin的Bar</span>
      <span>Particle style for GitHub Pages</span>
    </footer>

    <script src="assets/site.js"></script>
  </body>
</html>
