<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>文章 | Phil Lin的Bar</title>
    <link rel="stylesheet" href="assets/styles.css">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html"><span class="brand-mark">S</span><span>Phil Lin的Bar</span></a>
      <nav class="nav-links" aria-label="主导航">
        <a href="index.html">首页</a>
        <a href="posts.html" aria-current="page">文章</a>
        <a href="friends.html">友链</a>
        <a href="about.html">关于我</a>
      </nav>
      <button class="icon-button" id="themeToggle" type="button" aria-label="切换明暗主题" title="切换主题">◐</button>
    </header>

    <main class="page">
      <section class="page-heading">
        <p class="eyebrow">Archive</p>
        <h1>文章归档</h1>
        <p>这里会放已经准备好公开的文章。目前文章还在整理中。</p>
      </section>

      <section class="toolbar" aria-label="个性化设置">
        <div>
          <strong>阅读外观</strong>
          <span>这些设置会保存在当前浏览器里。</span>
        </div>
        <div class="control-row">
          <button class="chip" data-accent="teal" type="button">青绿</button>
          <button class="chip" data-accent="coral" type="button">珊瑚</button>
          <button class="chip" data-accent="gold" type="button">琥珀</button>
        </div>
      </section>

      <section class="post-list">
        <article class="post-card">
          <span class="post-date">No public posts</span>
          <h2>暂无公开文章</h2>
          <p>保留了一篇未发布的格式参考稿，等正式内容完成后再放到这里。</p>
        </article>
      </section>
    </main>

    <footer class="site-footer">
      <span>© 2026 Phil Lin的Bar</span>
      <span><a href="about.html">关于我</a></span>
    </footer>

    <script src="assets/site.js"></script>
